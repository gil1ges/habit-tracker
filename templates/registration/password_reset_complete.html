{% extends "base.html" %}

{% block title %}Password Reset Complete | Habit Tracker{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-sm text-center">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 mb-3">Password reset complete</h1>
                <p class="text-secondary mb-4">Your new password is set. You can sign in now.</p>
                <a class="btn btn-primary" href="{% url 'login' %}">Go to login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
