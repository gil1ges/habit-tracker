{% extends "base.html" %}

{% block title %}Удаление привычки{% endblock %}

{% block content %}
<section class="row justify-content-center">
    <div class="col-12 col-lg-7 col-xl-6">
        <article class="card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
                <h1 class="h3 mb-3">Удалить привычку</h1>
                <p class="text-muted mb-4">
                    Вы действительно хотите удалить привычку <strong>{{ object.title }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <button type="submit" class="btn btn-danger">Удалить</button>
                        <a class="btn btn-outline-secondary" href="{% url 'habit_detail' object.pk %}">Отмена</a>
                    </div>
                </form>
            </div>
        </article>
    </div>
</section>
{% endblock %}
