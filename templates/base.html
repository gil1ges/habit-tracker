<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Habit Tracker{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'habit_list' %}">Habit Tracker</a>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'habit_list' %}">Привычки</a>
                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-light btn-sm">Выйти</button>
                    </form>
                {% else %}
                    <a class="btn btn-light btn-sm" href="{% url 'login' %}">Войти</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            {% if messages %}
                <section class="mb-4" aria-label="Сообщения">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }} mb-2" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                </section>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
</body>
</html>
